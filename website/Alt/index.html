    data-en="Semetra is your personal study workspace: Everything for your studies in one place. Modules, grades, schedule, tasks, flashcards and more."
    content="Semetra ist dein persönlicher Studien-Workspace: Alles für dein Studium an einem Ort. Module, Noten, Stundenplan, Aufgaben, Karteikarten und mehr.">
  <meta property="og:title" content="Semetra — Dein persönlicher Studien-Workspace">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ═══ HERO ═══ */
    .hero {
      position: relative;
      padding: 120px 24px 100px;
      text-align: center;
      overflow: hidden;
      background: linear-gradient(160deg, #0d0820 0%, #1a1040 50%, #0d0820 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -20%; right: -10%;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.25), transparent 70%);
      animation: floatOrb 15s ease-in-out infinite;
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -15%; left: -5%;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.2), transparent 70%);
      animation: floatOrb 20s ease-in-out infinite reverse;
      pointer-events: none;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 30px) scale(1.1); }
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 900px; margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 8px 16px; border-radius: 100px;
      font-size: 0.8rem; font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
      backdrop-filter: blur(10px);
      animation: fadeInDown 0.8s ease forwards;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10b981; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 7vw, 4.5rem);
      font-weight: 400; line-height: 1.1;
      letter-spacing: -1px; color: #ffffff;
      margin: 0 auto 24px;
      animation: fadeInDown 0.8s ease 0.1s forwards;
      opacity: 0;
    }
    .hero h1 strong {
      font-weight: 400;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #7c3aed 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; background-size: 200% 200%;
      animation: gradientShift 5s ease infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .hero-subheading {
      font-size: 1.25rem; color: rgba(255, 255, 255, 0.7);
      max-width: 700px; margin: 0 auto 48px; line-height: 1.7;
      animation: fadeInDown 0.8s ease 0.2s forwards; opacity: 0;
    }
    .hero-actions {
      display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease 0.3s forwards; opacity: 0;
    }
    .btn-hero-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; padding: 16px 40px; border-radius: 12px;
      font-weight: 700; font-size: 1rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: 10px;
      transition: all 0.3s; border: none; cursor: pointer;
      box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
    }
    .btn-hero-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 48px rgba(124, 58, 237, 0.4); }
    .btn-hero-secondary {
      background: rgba(255, 255, 255, 0.1); color: white;
      padding: 16px 40px; border-radius: 12px;
      font-weight: 600; font-size: 1rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: 10px;
      transition: all 0.3s;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
    }
    .btn-hero-secondary:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.5); transform: translateY(-3px); }
    .hero-trust {
      display: flex; align-items: center; justify-content: center;
      gap: 32px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.55);
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease 0.4s forwards; opacity: 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .trust-item { display: flex; align-items: center; gap: 8px; }
    .trust-icon {
      width: 18px; height: 18px; border-radius: 50%;
      background: #10b981; display: flex; align-items: center;
      justify-content: center; color: white; font-size: 0.7rem; font-weight: 700;
    }

    /* ═══ STATS BAR ═══ */
    .stats-bar { background: var(--white); border-bottom: 1px solid var(--ink-10); padding: 40px 24px; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 32px; max-width: 900px; margin: 0 auto; text-align: center;
    }
    .stat-number { font-family: 'DM Serif Display', serif; font-size: 2.5rem; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 0.8rem; color: var(--ink-40); font-weight: 500; }

    /* ═══ PROBLEM/SOLUTION ═══ */
    .problem-section { padding: 100px 24px; background: var(--white); }
    .problem-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 64px; max-width: 1120px; margin: 0 auto; align-items: center;
    }
    .problem-text h2 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 3.5vw, 2.4rem);
      line-height: 1.2; margin-bottom: 20px;
    }
    .problem-text p { color: var(--ink-60); font-size: 1.05rem; line-height: 1.7; margin-bottom: 16px; }
    .pain-list { list-style: none; padding: 0; margin-top: 24px; }
    .pain-list li {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; font-size: 0.95rem; color: var(--ink-60);
    }
    .pain-list li .icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .solution-box {
      background: linear-gradient(135deg, #0d0820, #1a1040);
      border-radius: 24px; padding: 48px; color: white;
    }
    .solution-box h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem; margin-bottom: 16px;
    }
    .solution-box p { color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 24px; font-size: 1.05rem; }
    .solution-list { list-style: none; padding: 0; }
    .solution-list li {
      padding: 8px 0; font-size: 0.92rem; color: rgba(255,255,255,0.85);
      display: flex; align-items: center; gap: 10px;
    }
    .solution-list li::before { content: '\2713'; color: #10b981; font-weight: 700; font-size: 1rem; }

    /* ═══ SHOWCASE (Benefits) ═══ */
    .showcase-section {
      padding: 100px 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f8f6fc 100%);
    }
    .showcase-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; max-width: 1120px; margin: 0 auto;
    }
    .showcase-card {
      position: relative; border-radius: 20px; padding: 40px;
      background: var(--white); border: 1px solid var(--ink-10);
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      overflow: hidden;
    }
    .showcase-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(13,8,32,0.1); border-color: var(--accent); }
    .showcase-card.featured {
      grid-column: 1 / -1; display: grid;
      grid-template-columns: 1fr 1fr; gap: 40px; align-items: center;
      background: linear-gradient(135deg, #0d0820, #1a1040);
      border-color: rgba(124, 58, 237, 0.3); color: white;
    }
    .showcase-card.featured:hover { border-color: rgba(124, 58, 237, 0.6); }
    .showcase-card.featured .showcase-card-label { color: rgba(255,255,255,0.5); }
    .showcase-card.featured .showcase-card-title { color: white; }
    .showcase-card.featured .showcase-card-desc { color: rgba(255,255,255,0.7); }
    .showcase-card.featured .showcase-card-features li { color: rgba(255,255,255,0.8); }
    .showcase-card.featured .showcase-card-features li::before { color: #10b981; }
    .showcase-icon {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 20px;
    }
    .showcase-card-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 8px; }
    .showcase-card-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; line-height: 1.2; color: var(--ink); margin-bottom: 12px; }
    .showcase-card-desc { color: var(--ink-60); font-size: 0.95rem; line-height: 1.7; margin-bottom: 16px; }
    .showcase-card-features { list-style: none; padding: 0; }
    .showcase-card-features li { font-size: 0.85rem; color: var(--ink-60); padding: 4px 0; display: flex; align-items: center; gap: 8px; }
    .showcase-card-features li::before { content: '\2713'; color: var(--green); font-weight: 700; font-size: 0.9rem; }
    .showcase-mockup {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px; min-height: 280px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .mockup-bar { display: flex; gap: 6px; margin-bottom: 8px; }
    .mockup-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .mockup-row { display: flex; gap: 8px; align-items: center; }
    .mockup-pill { padding: 6px 14px; border-radius: 8px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }

    /* ═══ TESTIMONIAL / SOCIAL PROOF ═══ */
    .social-section { padding: 80px 24px; background: var(--surface); }
    .social-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; max-width: 1000px; margin: 0 auto;
    }
    .social-card {
      padding: 28px; border-radius: 16px; background: var(--white);
      border: 1px solid var(--ink-10);
    }
    .social-card .emoji { font-size: 1.4rem; margin-bottom: 12px; }
    .social-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
    .social-card p { font-size: 0.88rem; color: var(--ink-60); line-height: 1.6; }

    /* ═══ CTA SECTION ═══ */
    .cta-section {
      padding: 100px 24px;
      background: linear-gradient(160deg, #0d0820 0%, #1a1040 50%, #0d0820 100%);
      text-align: center; position: relative; overflow: hidden;
    }
    .cta-section::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 800px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 60%);
      pointer-events: none;
    }
    .cta-content { position: relative; z-index: 2; max-width: 600px; margin: 0 auto; }
    .cta-content h2 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); color: white; margin-bottom: 16px; }
    .cta-content p { color: rgba(255,255,255,0.65); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.7; }

    /* ═══ LANG TOGGLE ═══ */
    /* Language switch pill */
    .lang-switch {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; overflow: hidden;
      cursor: pointer; user-select: none;
    }
    .lang-opt {
      padding: 5px 10px; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.5px; color: rgba(255,255,255,0.4);
      transition: all 0.2s;
    }
    .lang-opt.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    /* Light variant for pages with light nav */
    .nav-light .lang-switch {
      background: var(--ink-05); border-color: var(--ink-10);
    }
    .nav-light .lang-opt { color: var(--ink-20); }
    .nav-light .lang-opt.active { background: var(--ink); color: #fff; }
    .nav-mobile-actions {
      display: none; align-items: center; gap: 8px;
    }
    .nav-light .lang-toggle {
      background: var(--ink-05); border-color: var(--ink-10);
      color: var(--ink-60);
    }
    .nav-light .lang-toggle:hover { background: var(--ink-10); color: var(--ink); }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 860px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; }
      .problem-grid { grid-template-columns: 1fr; gap: 40px; }
      .showcase-grid { grid-template-columns: 1fr; }
      .showcase-card.featured { grid-template-columns: 1fr; }
      .social-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .hero { padding: 80px 16px 60px; min-height: auto; }
      .hero h1 { font-size: clamp(2rem, 6vw, 3rem); }
      .showcase-card { padding: 24px; }
      .showcase-card.featured { padding: 24px; }
      .nav-mobile-actions { display: flex; }
    }
    @media (max-width: 560px) {
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .social-grid { grid-template-columns: 1fr; }
      .hero-trust { flex-direction: column; gap: 8px; }
      .showcase-card { padding: 20px; }
      .showcase-card.featured { padding: 20px; }
      .showcase-card-title { font-size: 1.3rem !important; }
      .showcase-mockup { padding: 16px; min-height: auto; }
      .mockup-row { flex-wrap: wrap; }
      .mockup-pill { font-size: 0.65rem !important; padding: 5px 10px; }
      .cta-content h2 { font-size: 1.5rem; }
      .cta-content p { font-size: 0.95rem; }
    }
  </style>
</head>

<!-- ═══ WHAT IS SEMETRA ═══ -->
<section class="problem-section">
  <div class="problem-grid">
    <div class="problem-text">
      <h2 data-de-html="Dein ganzes Studium.<br>Ein Workspace." data-en-html="Your entire studies.<br>One workspace."></h2>
      <p data-de="Semetra gibt dir einen zentralen Ort für alles, was im Studium wichtig ist. Kein Suchen, kein Vergessen, kein Durcheinander — du öffnest Semetra und weisst sofort, wo du stehst und was als Nächstes kommt." data-en="Semetra gives you one central place for everything that matters in your studies. No searching, no forgetting, no mess — you open Semetra and instantly know where you stand and what comes next."></p>
      <ul class="pain-list">
