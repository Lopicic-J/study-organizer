<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — Semetra</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="Melde dich bei deinem Semetra-Konto an. Verwalte dein Studium, deine Noten und mehr.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #f8f6fc 0%, #eef2ff 40%, #ede9fe 100%);
      padding: 24px;
      position: relative; overflow: hidden;
    }
    .auth-page::before {
      content: ''; position: absolute;
      top: -200px; right: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(79,70,229,0.06); filter: blur(80px);
      pointer-events: none;
    }
    .auth-page::after {
      content: ''; position: absolute;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px; border-radius: 50%;
      background: rgba(124,58,237,0.05); filter: blur(80px);
      pointer-events: none;
    }
    .auth-container {
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
    }
    .auth-logo {
      text-align: center; margin-bottom: 32px;
    }
    .auth-logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--violet));
      color: white; font-family: 'DM Serif Display', serif;
      font-size: 1.6rem; margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(79,70,229,0.25);
    }
    .auth-logo h1 {
      font-size: 1.5rem; font-weight: 700; color: var(--ink);
    }
    .auth-logo p {
      font-size: 0.875rem; color: var(--ink-40); margin-top: 4px;
    }
    .auth-card {
      background: var(--white);
      border: 1px solid var(--ink-10);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-l);
    }
    .auth-field { margin-bottom: 16px; }
    .auth-field label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--ink-80); margin-bottom: 6px;
    }
    .auth-field-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .auth-field-row a {
      font-size: 0.75rem; color: var(--accent); text-decoration: none; font-weight: 600;
    }
    .auth-field-row a:hover { text-decoration: underline; }
    .auth-input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--ink-10);
      border-radius: 10px; font-size: 0.875rem; font-family: inherit;
      background: var(--surface); color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }
    .auth-input-wrap {
      position: relative;
    }
    .auth-input-wrap .auth-input { padding-right: 40px; }
    .auth-pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--ink-40); padding: 4px; font-size: 0.8rem;
    }
    .auth-pw-toggle:hover { color: var(--ink-60); }
    .auth-error {
      background: #fef2f2; border: 1px solid #fecaca;
      color: #dc2626; border-radius: 10px;
      padding: 10px 14px; font-size: 0.8rem;
      margin-bottom: 16px; display: none;
    }
    .auth-success {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      color: #16a34a; border-radius: 10px;
      padding: 10px 14px; font-size: 0.8rem;
      margin-bottom: 16px; display: none;
    }
    .auth-submit {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--accent); color: white;
      font-size: 0.875rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(79,70,229,0.25);
    }
    .auth-submit:hover { background: var(--accent-h); transform: translateY(-1px); }
    .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-footer {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: var(--ink-40);
    }
    .auth-footer a {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-bottom {
      text-align: center; margin-top: 24px;
      font-size: 0.7rem; color: var(--ink-20);
    }
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--ink-20); font-size: 0.75rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--ink-10);
    }
    .auth-webapp-link {
      display: block; text-align: center;
      padding: 10px; border: 1.5px solid var(--ink-10);
      border-radius: 10px; font-size: 0.8rem; font-weight: 600;
      color: var(--ink-60); text-decoration: none;
      transition: all 0.2s;
    }
    .auth-webapp-link:hover {
      border-color: var(--accent); color: var(--accent);
      background: var(--accent-s);
    }
  </style>
</head>
<body>

<!-- ═══ NAV (minimal) ═══ -->
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">Semetra</a>
    <ul class="nav-links">
      <li><a href="warum-semetra.html">Warum Semetra?</a></li>
      <li><a href="features.html">Features</a></li>
      <li><a href="pricing.html">Preise</a></li>
      <li><a href="ueber-mich.html">Über mich</a></li>
    </ul>
    <a href="register.html" class="nav-cta">Registrieren</a>
  </div>
</nav>

<!-- ═══ LOGIN FORM ═══ -->
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">S</div>
      <h1>Willkommen zurück</h1>
      <p>Melde dich bei deinem Semetra-Konto an</p>
    </div>

    <div class="auth-card">
      <div class="auth-success" id="auth-success"></div>
      <div class="auth-error" id="auth-error"></div>

      <form id="login-form">
        <div class="auth-field">
          <label for="identifier">Benutzername oder E-Mail</label>
          <input class="auth-input" type="text" id="identifier" placeholder="max_muster oder deine@email.ch" required autocomplete="username email">
        </div>

        <div class="auth-field">
          <div class="auth-field-row">
            <label for="password">Passwort</label>
            <a href="#" id="forgot-link">Vergessen?</a>
          </div>
          <div class="auth-input-wrap">
            <input class="auth-input" type="password" id="password" placeholder="Dein Passwort" required autocomplete="current-password">
            <button type="button" class="auth-pw-toggle" id="pw-toggle">Zeigen</button>
          </div>
        </div>

        <button type="submit" class="auth-submit" id="submit-btn">Anmelden</button>
      </form>

      <div class="auth-footer">
        Noch kein Konto? <a href="register.html">Kostenlos registrieren</a>
      </div>

      <div class="auth-divider">oder</div>

      <a href="https://app.semetra.ch/login" class="auth-webapp-link">
        In der Web-App anmelden &rarr;
      </a>
    </div>

    <p class="auth-bottom">&copy; 2026 Lopicic Technologies &middot; Semetra</p>
  </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth.js"></script>
<script>
  const form = document.getElementById("login-form");
  const identifierInput = document.getElementById("identifier");
  const passwordInput = document.getElementById("password");
  const errorEl = document.getElementById("auth-error");
  const successEl = document.getElementById("auth-success");
  const submitBtn = document.getElementById("submit-btn");
  const pwToggle = document.getElementById("pw-toggle");
  const forgotLink = document.getElementById("forgot-link");

  // Check if already logged in
  (async () => {
    const user = await getUser();
    if (user) window.location.href = "profil.html";
  })();

  // Show confirmation success
  if (new URLSearchParams(window.location.search).get("confirmed") === "1") {
    successEl.textContent = "E-Mail bestätigt! Du kannst dich jetzt anmelden.";
    successEl.style.display = "block";
  }

  // Password toggle
  pwToggle.addEventListener("click", () => {
    const isPassword = passwordInput.type === "password";
    passwordInput.type = isPassword ? "text" : "password";
    pwToggle.textContent = isPassword ? "Verbergen" : "Zeigen";
  });

  // Forgot password
  forgotLink.addEventListener("click", async (e) => {
    e.preventDefault();
    const val = identifierInput.value.trim();
    if (!val) {
      errorEl.textContent = "Bitte gib zuerst deine E-Mail oder deinen Benutzernamen ein.";
      errorEl.style.display = "block";
      return;
    }
    let email = val;
    // If it's a username, resolve to email first
    if (!val.includes("@")) {
      const sb = getSupabase();
      const { data } = await sb.rpc("get_email_by_username", { lookup_username: val });
      if (!data) {
        errorEl.textContent = "Benutzername nicht gefunden.";
        errorEl.style.display = "block";
        return;
      }
      email = data;
    }
    try {
      await resetPassword(email);
      successEl.textContent = "Wir haben dir einen Link zum Zurücksetzen gesendet.";
      successEl.style.display = "block";
      errorEl.style.display = "none";
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = "block";
    }
  });

  // Login
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.style.display = "none";
    successEl.style.display = "none";
    submitBtn.disabled = true;
    submitBtn.textContent = "Wird angemeldet...";

    try {
      await signIn(identifierInput.value.trim(), passwordInput.value);
      window.location.href = "profil.html";
    } catch (err) {
      const msg = err.message === "Invalid login credentials"
        ? "Benutzername/E-Mail oder Passwort falsch."
        : err.message;
      errorEl.textContent = msg;
      errorEl.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Anmelden";
    }
  });
</script>
</body>
</html>
